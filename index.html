<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>施設使用申請書システム | 沖縄県体協スポーツ会館</title>
    <style>
        /* =========================================
           プロフェッショナル UI デザイン (Gov-Tech Style)
           ========================================= */
        :root { 
            --primary-blue: #1e3a8a;      /* 信頼感のある濃紺 */
            --secondary-blue: #3b82f6;    /* 鮮やかなアクセント */
            --bg-light: #f8fafc;          /* 背景色 */
            --text-dark: #1e293b;         /* メイン文字 */
            --text-muted: #64748b;        /* 補助文字 */
            --accent-green: #10b981;      /* 成功・決定 */
            --border-color: #e2e8f0;      /* 境界線 */
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body { 
            font-family: "Inter", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
            background: var(--bg-light); 
            margin: 0; 
            padding: 0; 
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* ヘッダー */
        .app-header { 
            background: var(--primary-blue); 
            color: white; 
            padding: 40px 20px; 
            text-align: center;
            border-bottom: 4px solid var(--secondary-blue);
        }
        .app-header h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: 0.05em; }
        .app-header p { margin: 10px 0 0 0; opacity: 0.8; font-size: 15px; }

        .container { max-width: 1000px; margin: -30px auto 60px; padding: 0 20px; }

        /* セクションカード */
        .card { 
            background: #ffffff; 
            border-radius: 12px; 
            box-shadow: var(--card-shadow); 
            padding: 32px; 
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }
        .section-title { 
            font-size: 1.25rem; 
            font-weight: 700; 
            color: var(--primary-blue); 
            margin-bottom: 24px; 
            display: flex; 
            align-items: center;
            border-left: 5px solid var(--primary-blue);
            padding-left: 15px;
        }

        /* フォーム要素 */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: var(--text-dark); }
        input, select, textarea { 
            width: 100%; padding: 12px 16px; border: 1px solid var(--border-color); 
            border-radius: 8px; font-size: 16px; transition: all 0.2s;
            background: #ffffff; box-sizing: border-box;
        }
        input:focus, select:focus { outline: none; border-color: var(--secondary-blue); ring: 2px var(--secondary-blue); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        /* 予約枠のデザイン */
        .entry-row { 
            background: #f1f5f9; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            display: grid;
            grid-template-columns: 2fr 1.5fr 1fr 1fr auto;
            gap: 12px;
            align-items: end;
        }
        @media (max-width: 768px) { .entry-row { grid-template-columns: 1fr; } }

        /* 計算バー */
        .sticky-calc-bar {
            position: sticky;
            bottom: 20px;
            background: #ffffff;
            border: 2px solid var(--primary-blue);
            border-radius: 16px;
            padding: 24px 40px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        .total-label { font-size: 14px; color: var(--text-muted); font-weight: bold; }
        .total-amount { font-size: 32px; font-weight: 800; color: var(--primary-blue); }
        .btn-print { 
            background: var(--accent-green); color: white; border: none; padding: 16px 32px; 
            border-radius: 8px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-print:hover { background: #059669; transform: translateY(-2px); }

        /* 印刷設定 */
        .print-only { display: none; }
        @media print {
            .app-header, .container, .sticky-calc-bar { display: none !important; }
            .print-only { display: block; font-family: "MS Mincho", serif; }
            /* (印刷用スタイルは前回の完成度を維持) */
            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid #000; padding: 8px; text-align: center; }
            .p-title { font-size: 20pt; text-align: center; margin: 30px 0; }
        }
    </style>
</head>
<body>

<header class="app-header">
    <h1>沖縄県体協スポーツ会館 使用申請システム</h1>
    <p>公的施設の利用予約をスムーズに。内容を入力後、印刷用PDFが出力可能です。</p>
</header>

<main class="container">
    <div class="card">
        <h2 class="section-title">利用区分の設定</h2>
        <div class="form-group">
            <label>利用カテゴリー</label>
            <select id="in_category" onchange="toggleAffiliated(); calc();" style="font-weight:bold; color:var(--primary-blue);">
                <option value="その他一般">その他一般（標準料金）</option>
                <option value="加盟（入居）団体">沖縄県スポーツ協会 加盟・入居団体（減額適用）</option>
                <option value="高校生以下">高校生以下（体育館のみ減額適用）</option>
            </select>
        </div>
        <div id="org_select_area" style="display:none; margin-top:15px; padding:15px; background:#eff6ff; border-radius:8px;">
            <label>団体名を選択</label>
            <select id="in_org_list" onchange="syncOrgName()">
                <option value="">-- 選択してください --</option>
                <option value="沖縄県サッカー協会">沖縄県サッカー協会</option>
                <option value="沖縄県野球連盟">沖縄県野球連盟</option>
                <option value="沖縄県バスケットボール協会">沖縄県バスケットボール協会</option>
                <option value="その他">その他（直接入力）</option>
            </select>
        </div>
    </div>

    <div class="card">
        <h2 class="section-title">申請者情報</h2>
        <div class="grid">
            <div class="form-group"><label>団体名</label><input type="text" id="in_orgName" placeholder="例：沖縄県〇〇協会"></div>
            <div class="form-group"><label>代表者名</label><input type="text" id="in_repName" placeholder="例：沖縄 太郎"></div>
            <div class="form-group"><label>申請者（担当者）氏名</label><input type="text" id="in_appName" placeholder="例：スポーツ 花子"></div>
            <div class="form-group"><label>連絡先（携帯電話）</label><input type="tel" id="in_phone" placeholder="090-0000-0000"></div>
        </div>
    </div>

    <div class="card">
        <h2 class="section-title">使用日時・施設</h2>
        <div id="entries_container">
            </div>
        <p style="font-size: 13px; color: var(--text-muted);">※空調代は、利用時間（1時間単位・端数切り上げ）に応じて加算されます。</p>
    </div>

    <div class="sticky-calc-bar">
        <div>
            <div class="total-label">お支払い合計額</div>
            <div class="total-amount" id="ui_total">¥ 0</div>
        </div>
        <button class="btn-print" onclick="window.print()">
            申請書を生成（印刷・PDF）
        </button>
    </div>
</main>

<div class="print-only">
    <div class="p-title">施設使用申請書</div>
    <table>
        <tr><th width="150">団体名</th><td id="p_orgName" colspan="3"></td></tr>
        <tr><th>申請者</th><td id="p_appName"></td><th>連絡先</th><td id="p_phone"></td></tr>
        <tr><th>使用目的</th><td id="p_purpose" colspan="3"></td></tr>
        <tr>
            <th>使用日時</th>
            <td colspan="3" id="p_datetime_list" style="text-align:left; padding:20px; line-height:2;"></td>
        </tr>
    </table>
    <h2 style="text-align:right; margin-top:40px;">合計金額：<span id="p_total"></span>円</h2>
</div>

<script>
    // 料金マスターデータ
    const RATES = {
        "体育館": { "高校生以下": { day: 770, night: 1100 }, "加盟（入居）団体": { day: 770, night: 1100 }, "その他一般": { day: 1100, night: 1650 }, ac: 0 },
        "会議室AB": { "加盟（入居）団体": { day: 770, night: 1100 }, "その他一般": { day: 1100, night: 1650 }, ac: 550 },
        "会議室A": { "加盟（入居）団体": { day: 440, night: 660 }, "その他一般": { day: 660, night: 990 }, ac: 330 },
        "会議室B": { "加盟（入居）団体": { day: 330, night: 440 }, "その他一般": { day: 440, night: 660 }, ac: 220 }
    };

    // 予約枠の生成
    function createEntries() {
        const container = document.getElementById('entries_container');
        for (let i = 1; i <= 3; i++) {
            const row = document.createElement('div');
            row.className = 'entry-row';
            row.innerHTML = `
                <div><label>施設</label><select id="fac_${i}" onchange="calc()"><option value="">選択してください</option><option value="体育館">体育館</option><option value="会議室AB">会議室 AB</option><option value="会議室A">会議室 A</option><option value="会議室B">会議室 B</option></select></div>
                <div><label>使用日</label><input type="date" id="date_${i}" onchange="calc()"></div>
                <div><label>開始</label><input type="time" id="start_${i}" value="09:00" onchange="calc()"></div>
                <div><label>終了</label><input type="time" id="end_${i}" value="12:00" onchange="calc()"></div>
                <div style="padding-bottom:12px;"><label style="display:flex; align-items:center; cursor:pointer;"><input type="checkbox" id="ac_${i}" onchange="calc()" style="width:auto; margin-right:8px;">空調</label></div>
            `;
            container.appendChild(row);
        }
    }

    function toggleAffiliated() {
        const cat = document.getElementById('in_category').value;
        document.getElementById('org_select_area').style.display = (cat === '加盟（入居）団体') ? 'block' : 'none';
    }

    function syncOrgName() {
        const val = document.getElementById('in_org_list').value;
        if (val && val !== 'その他') document.getElementById('in_orgName').value = val;
    }

    // ★ 計算ロジックの核心
    function calc() {
        let total = 0;
        const category = document.getElementById('in_category').value;

        for (let i = 1; i <= 3; i++) {
            const fac = document.getElementById(`fac_${i}`).value;
            const dateStr = document.getElementById(`date_${i}`).value;
            const start = document.getElementById(`start_${i}`).value;
            const end = document.getElementById(`end_${i}`).value;
            const useAc = document.getElementById(`ac_${i}`).checked;

            if (!fac || !dateStr) continue;

            const date = new Date(dateStr);
            const isHoliday = (date.getDay() === 0 || date.getDay() === 6); // 土日を休日判定（祝日は拡張可能）
            
            // 時間計算
            const startH = parseInt(start.split(':')[0]);
            const endH = parseInt(end.split(':')[0]);
            const endM = parseInt(end.split(':')[1]);
            let hours = endH - startH + (endM > 0 ? 1 : 0);
            if (hours <= 0) continue;

            // 料金テーブル参照
            let rateType = (isHoliday || startH >= 17) ? 'night' : 'day';
            
            // 会議室の場合、高校生以下も一般料金を適用
            let calcCategory = category;
            if (fac.includes("会議室") && category === "高校生以下") calcCategory = "その他一般";

            const unitPrice = RATES[fac][calcCategory][rateType];
            const acPrice = useAc ? (RATES[fac].ac * hours) : 0;

            total += (unitPrice * hours) + acPrice;
        }

        document.getElementById('ui_total').innerText = `¥ ${total.toLocaleString()}`;
        document.getElementById('p_total').innerText = total.toLocaleString();
        updatePrintView();
    }

    function updatePrintView() {
        document.getElementById('p_orgName').innerText = document.getElementById('in_orgName').value;
        document.getElementById('p_appName').innerText = document.getElementById('in_appName').value;
        document.getElementById('p_phone').innerText = document.getElementById('in_phone').value;
        
        let detail = "";
        for(let i=1; i<=3; i++) {
            const fac = document.getElementById(`fac_${i}`).value;
            if(!fac) continue;
            detail += `${document.getElementById(`date_${i}`).value}　${fac}　${document.getElementById(`start_${i}`).value}～${document.getElementById(`end_${i}`).value}<br>`;
        }
        document.getElementById('p_datetime_list').innerHTML = detail;
    }

    window.onload = createEntries;
</script>

</body>
</html>
